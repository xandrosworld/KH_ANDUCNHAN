name: Deploy Sổ Đỏ Vạn Phúc

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sodovanphuc-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to Mắt Bão VPS
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.MATBAO_SSH_HOST }}
      SSH_PORT: ${{ secrets.MATBAO_SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.MATBAO_SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.MATBAO_SSH_PRIVATE_KEY }}
      REMOTE_WEBROOT: ${{ secrets.MATBAO_WEBROOT || '/var/www/sodovanphuc/public_html' }}
      SVP_OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.SVP_OAUTH_GOOGLE_CLIENT_ID }}
      SVP_OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.SVP_OAUTH_GOOGLE_CLIENT_SECRET }}
      SVP_OAUTH_FACEBOOK_CLIENT_ID: ${{ secrets.SVP_OAUTH_FACEBOOK_CLIENT_ID }}
      SVP_OAUTH_FACEBOOK_CLIENT_SECRET: ${{ secrets.SVP_OAUTH_FACEBOOK_CLIENT_SECRET }}
      SVP_OAUTH_ZALO_CLIENT_ID: ${{ secrets.SVP_OAUTH_ZALO_CLIENT_ID }}
      SVP_OAUTH_ZALO_CLIENT_SECRET: ${{ secrets.SVP_OAUTH_ZALO_CLIENT_SECRET }}
      SVP_OAUTH_APPLE_CLIENT_ID: ${{ secrets.SVP_OAUTH_APPLE_CLIENT_ID }}
      SVP_OAUTH_APPLE_CLIENT_SECRET: ${{ secrets.SVP_OAUTH_APPLE_CLIENT_SECRET }}
      SVP_OAUTH_APPLE_TEAM_ID: ${{ secrets.SVP_OAUTH_APPLE_TEAM_ID }}
      SVP_OAUTH_APPLE_KEY_ID: ${{ secrets.SVP_OAUTH_APPLE_KEY_ID }}
      SVP_OAUTH_APPLE_PRIVATE_KEY: ${{ secrets.SVP_OAUTH_APPLE_PRIVATE_KEY }}
      SVP_MAIL_FROM: ${{ secrets.SVP_MAIL_FROM }}
      SVP_MAIL_FROM_NAME: ${{ secrets.SVP_MAIL_FROM_NAME }}
      SVP_ADMIN_EMAIL: ${{ secrets.SVP_ADMIN_EMAIL }}
      SVP_SMTP_HOST: ${{ secrets.SVP_SMTP_HOST }}
      SVP_SMTP_PORT: ${{ secrets.SVP_SMTP_PORT }}
      SVP_SMTP_USER: ${{ secrets.SVP_SMTP_USER }}
      SVP_SMTP_PASS: ${{ secrets.SVP_SMTP_PASS }}
      SVP_SMTP_SECURE: ${{ secrets.SVP_SMTP_SECURE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare deploy package
        run: |
          set -euo pipefail
          rm -rf .deploy-package
          mkdir -p .deploy-package/public_html/backend/uploads

          cp -a dist/. .deploy-package/public_html/

          rsync -a \
            --exclude 'config/config.php' \
            --exclude 'api/debug_test.php' \
            --exclude 'uploads/*' \
            backend/ .deploy-package/public_html/backend/

          if [ -f backend/uploads/.htaccess ]; then
            cp backend/uploads/.htaccess .deploy-package/public_html/backend/uploads/.htaccess
          fi
          touch .deploy-package/public_html/backend/uploads/.gitkeep

      - name: Configure SSH
        run: |
          set -euo pipefail
          test -n "$SSH_HOST"
          test -n "$SSH_USER"
          test -n "$SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/sodovanphuc_deploy_key
          chmod 600 ~/.ssh/sodovanphuc_deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Verify remote config is present
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            mkdir -p '$REMOTE_WEBROOT/backend/config' '$REMOTE_WEBROOT/backend/uploads'
            test -f '$REMOTE_WEBROOT/backend/config/config.php'
          "

      - name: Upload files
        run: |
          set -euo pipefail
          tar -C .deploy-package/public_html -czf - . | ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            tar -xzf - -C '$REMOTE_WEBROOT'
          "

      - name: Sync optional OAuth secrets
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const keys = [
            'SVP_OAUTH_GOOGLE_CLIENT_ID',
            'SVP_OAUTH_GOOGLE_CLIENT_SECRET',
            'SVP_OAUTH_FACEBOOK_CLIENT_ID',
            'SVP_OAUTH_FACEBOOK_CLIENT_SECRET',
            'SVP_OAUTH_ZALO_CLIENT_ID',
            'SVP_OAUTH_ZALO_CLIENT_SECRET',
            'SVP_OAUTH_APPLE_CLIENT_ID',
            'SVP_OAUTH_APPLE_CLIENT_SECRET',
            'SVP_OAUTH_APPLE_TEAM_ID',
            'SVP_OAUTH_APPLE_KEY_ID',
            'SVP_OAUTH_APPLE_PRIVATE_KEY',
          ];
          const lines = keys
            .filter((key) => process.env[key])
            .map((key) => `${key}=${JSON.stringify(process.env[key])}`);
          fs.writeFileSync('.oauth-env', lines.length ? `${lines.join('\n')}\n` : '');
          NODE

          if [ -s .oauth-env ]; then
            ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
              set -e
              mkdir -p '$REMOTE_WEBROOT/backend'
              if [ -f '$REMOTE_WEBROOT/backend/.env' ]; then
                grep -v -E '^SVP_OAUTH_(GOOGLE|FACEBOOK|ZALO|APPLE)_' '$REMOTE_WEBROOT/backend/.env' > '$REMOTE_WEBROOT/backend/.env.tmp' || true
              else
                : > '$REMOTE_WEBROOT/backend/.env.tmp'
              fi
              cat >> '$REMOTE_WEBROOT/backend/.env.tmp'
              mv '$REMOTE_WEBROOT/backend/.env.tmp' '$REMOTE_WEBROOT/backend/.env'
              chmod 600 '$REMOTE_WEBROOT/backend/.env' || true
            " < .oauth-env
          fi

      - name: Sync mail config secrets
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const envToConstant = {
            SVP_MAIL_FROM: 'MAIL_FROM',
            SVP_MAIL_FROM_NAME: 'MAIL_FROM_NAME',
            SVP_ADMIN_EMAIL: 'ADMIN_EMAIL',
            SVP_SMTP_HOST: 'SMTP_HOST',
            SVP_SMTP_PORT: 'SMTP_PORT',
            SVP_SMTP_USER: 'SMTP_USER',
            SVP_SMTP_PASS: 'SMTP_PASS',
            SVP_SMTP_SECURE: 'SMTP_SECURE',
          };
          const values = {};
          for (const [envName, constantName] of Object.entries(envToConstant)) {
            const rawValue = process.env[envName];
            if (rawValue) values[constantName] = rawValue === '__EMPTY__' ? '' : rawValue;
          }
          fs.writeFileSync('.mail-config.json', JSON.stringify(values));
          NODE

          cat > .patch-mail-config.mjs <<'NODE'
          import fs from 'node:fs';

          const values = JSON.parse(fs.readFileSync('.mail-config.json', 'utf8'));
          let content = fs.readFileSync('.remote-config.php', 'utf8');

          function phpString(value) {
            return String(value).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
          }

          function upsertPhpConstant(name, replacement) {
            const escapedName = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const pattern = new RegExp(
              `define\\(\\s*['"]${escapedName}['"]\\s*,\\s*(?:"(?:\\\\"|[^"])*"|'(?:\\\\'|[^'])*'|\\d+)\\s*\\);`,
            );
            if (pattern.test(content)) {
              content = content.replace(pattern, replacement);
              return;
            }
            if (/\?>\s*$/.test(content)) {
              content = content.replace(/\?>\s*$/, `\n${replacement}\n?>`);
              return;
            }
            content += `\n${replacement}\n`;
          }

          for (const [name, rawValue] of Object.entries(values)) {
            if (name === 'SMTP_PORT') {
              const port = Number.parseInt(String(rawValue), 10);
              if (!Number.isInteger(port) || port <= 0) throw new Error('SVP_SMTP_PORT must be a positive integer');
              upsertPhpConstant(name, `define('${name}', ${port});`);
            } else {
              upsertPhpConstant(name, `define('${name}', '${phpString(rawValue)}');`);
            }
          }

          fs.writeFileSync('.remote-config.php', content);
          NODE

          if [ "$(cat .mail-config.json)" != "{}" ]; then
            ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "cat '$REMOTE_WEBROOT/backend/config/config.php'" > .remote-config.php
            node .patch-mail-config.mjs
            ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "cat > '$REMOTE_WEBROOT/backend/config/config.php' && chmod 600 '$REMOTE_WEBROOT/backend/config/config.php' || true" < .remote-config.php
          fi

      - name: Diagnose mail transport
        if: env.SVP_SMTP_HOST != ''
        run: |
          set -euo pipefail
          mail_diag=".codex-mail-diagnostic-${GITHUB_RUN_ID}.php"
          cleanup_mail_diag() {
            ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "rm -f '$REMOTE_WEBROOT/$mail_diag'" || true
          }
          trap cleanup_mail_diag EXIT
          ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "cat > '$REMOTE_WEBROOT/$mail_diag'" <<'PHP'
          <?php
          header('Content-Type: text/plain; charset=utf-8');
          require_once __DIR__ . '/backend/config/config.php';
          require_once __DIR__ . '/backend/lib/Mailer.php';

          $to = defined('ADMIN_EMAIL') ? ADMIN_EMAIL : '';
          $from = defined('MAIL_FROM') ? MAIL_FROM : '';
          if (!$to || !$from) {
              echo "MAIL_FAIL missing MAIL_FROM or ADMIN_EMAIL\n";
              exit(1);
          }

          echo "MAIL_CONFIG host=" . (defined('SMTP_HOST') ? SMTP_HOST : '') .
              " port=" . (defined('SMTP_PORT') ? SMTP_PORT : '') .
              " secure=" . (defined('SMTP_SECURE') ? SMTP_SECURE : '') .
              " user=" . (defined('SMTP_USER') ? preg_replace('/^(.{2}).+(@.+)$/', '$1***$2', SMTP_USER) : '') .
              " from=" . preg_replace('/^(.{2}).+(@.+)$/', '$1***$2', $from) .
              " to=" . preg_replace('/^(.{2}).+(@.+)$/', '$1***$2', $to) . "\n";

          foreach (['mail.hocvienvanphuc.edu.vn', 'pro57.emailserver.vn', 'localhost'] as $host) {
              foreach ([25, 465, 587, 2525] as $port) {
                  $errno = 0;
                  $errstr = '';
                  $fp = @fsockopen($host, $port, $errno, $errstr, 5);
                  if ($fp) {
                      fclose($fp);
                      echo "MAIL_CONNECT_OK {$host}:{$port}\n";
                  } else {
                      echo "MAIL_CONNECT_FAIL {$host}:{$port} {$errno} {$errstr}\n";
                  }
              }
          }

          try {
              $sent = Mailer::send($to, 'SVP deploy mail diagnostic', '<p>SVP deploy mail diagnostic.</p>');
              if (!$sent) {
                  echo "MAIL_FAIL Mailer::send returned false\n";
                  exit(1);
              }
              echo "MAIL_OK\n";
          } catch (Throwable $e) {
              echo "MAIL_FAIL " . str_replace([(defined('SMTP_PASS') ? SMTP_PASS : ''), (defined('SMTP_USER') ? SMTP_USER : '')], ['***', '***'], $e->getMessage()) . "\n";
              exit(1);
          }
          PHP
          curl -fsS "https://sodovanphuc.vn/$mail_diag"

      - name: Fix permissions and smoke test
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            chmod 755 '$REMOTE_WEBROOT' '$REMOTE_WEBROOT/backend' '$REMOTE_WEBROOT/backend/api' || true
            find '$REMOTE_WEBROOT/backend/uploads' -type d -exec chmod 777 {} \; || true
            find '$REMOTE_WEBROOT/backend/uploads' -type f -exec chmod 644 {} \; || true
            chown -R apache:apache '$REMOTE_WEBROOT/backend/uploads' 2>/dev/null || true
          "
          reset_file=".codex-opcache-reset-${GITHUB_RUN_ID}.php"
          cleanup_reset() {
            ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "rm -f '$REMOTE_WEBROOT/$reset_file'" || true
          }
          trap cleanup_reset EXIT
          ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "cat > '$REMOTE_WEBROOT/$reset_file'" <<'PHP'
          <?php
          header('Content-Type: text/plain; charset=utf-8');
          if (function_exists('opcache_reset')) {
              echo opcache_reset() ? 'OPCACHE_RESET_OK' : 'OPCACHE_RESET_SKIPPED';
          } else {
              echo 'OPCACHE_NOT_AVAILABLE';
          }
          PHP
          curl -fsS "https://sodovanphuc.vn/$reset_file"
          curl -fsS https://sodovanphuc.vn/api/svp/health
