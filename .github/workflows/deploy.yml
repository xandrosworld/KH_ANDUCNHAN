name: Deploy Sổ Đỏ Vạn Phúc

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sodovanphuc-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to Mắt Bão VPS
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.MATBAO_SSH_HOST }}
      SSH_PORT: ${{ secrets.MATBAO_SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.MATBAO_SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.MATBAO_SSH_PRIVATE_KEY }}
      REMOTE_WEBROOT: ${{ secrets.MATBAO_WEBROOT || '/var/www/sodovanphuc/public_html' }}
      SVP_OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.SVP_OAUTH_GOOGLE_CLIENT_ID }}
      SVP_OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.SVP_OAUTH_GOOGLE_CLIENT_SECRET }}
      SVP_OAUTH_FACEBOOK_CLIENT_ID: ${{ secrets.SVP_OAUTH_FACEBOOK_CLIENT_ID }}
      SVP_OAUTH_FACEBOOK_CLIENT_SECRET: ${{ secrets.SVP_OAUTH_FACEBOOK_CLIENT_SECRET }}
      SVP_OAUTH_ZALO_CLIENT_ID: ${{ secrets.SVP_OAUTH_ZALO_CLIENT_ID }}
      SVP_OAUTH_ZALO_CLIENT_SECRET: ${{ secrets.SVP_OAUTH_ZALO_CLIENT_SECRET }}
      SVP_OAUTH_APPLE_CLIENT_ID: ${{ secrets.SVP_OAUTH_APPLE_CLIENT_ID }}
      SVP_OAUTH_APPLE_CLIENT_SECRET: ${{ secrets.SVP_OAUTH_APPLE_CLIENT_SECRET }}
      SVP_OAUTH_APPLE_TEAM_ID: ${{ secrets.SVP_OAUTH_APPLE_TEAM_ID }}
      SVP_OAUTH_APPLE_KEY_ID: ${{ secrets.SVP_OAUTH_APPLE_KEY_ID }}
      SVP_OAUTH_APPLE_PRIVATE_KEY: ${{ secrets.SVP_OAUTH_APPLE_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare deploy package
        run: |
          set -euo pipefail
          rm -rf .deploy-package
          mkdir -p .deploy-package/public_html/backend/uploads

          cp -a dist/. .deploy-package/public_html/

          rsync -a \
            --exclude 'config/config.php' \
            --exclude 'api/debug_test.php' \
            --exclude 'uploads/*' \
            backend/ .deploy-package/public_html/backend/

          if [ -f backend/uploads/.htaccess ]; then
            cp backend/uploads/.htaccess .deploy-package/public_html/backend/uploads/.htaccess
          fi
          touch .deploy-package/public_html/backend/uploads/.gitkeep

      - name: Configure SSH
        run: |
          set -euo pipefail
          test -n "$SSH_HOST"
          test -n "$SSH_USER"
          test -n "$SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/sodovanphuc_deploy_key
          chmod 600 ~/.ssh/sodovanphuc_deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Verify remote config is present
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            mkdir -p '$REMOTE_WEBROOT/backend/config' '$REMOTE_WEBROOT/backend/uploads'
            test -f '$REMOTE_WEBROOT/backend/config/config.php'
          "

      - name: Upload files
        run: |
          set -euo pipefail
          tar -C .deploy-package/public_html -czf - . | ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            tar -xzf - -C '$REMOTE_WEBROOT'
          "

      - name: Sync optional OAuth secrets
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const keys = [
            'SVP_OAUTH_GOOGLE_CLIENT_ID',
            'SVP_OAUTH_GOOGLE_CLIENT_SECRET',
            'SVP_OAUTH_FACEBOOK_CLIENT_ID',
            'SVP_OAUTH_FACEBOOK_CLIENT_SECRET',
            'SVP_OAUTH_ZALO_CLIENT_ID',
            'SVP_OAUTH_ZALO_CLIENT_SECRET',
            'SVP_OAUTH_APPLE_CLIENT_ID',
            'SVP_OAUTH_APPLE_CLIENT_SECRET',
            'SVP_OAUTH_APPLE_TEAM_ID',
            'SVP_OAUTH_APPLE_KEY_ID',
            'SVP_OAUTH_APPLE_PRIVATE_KEY',
          ];
          const lines = keys
            .filter((key) => process.env[key])
            .map((key) => `${key}=${JSON.stringify(process.env[key])}`);
          fs.writeFileSync('.oauth-env', lines.length ? `${lines.join('\n')}\n` : '');
          NODE

          if [ -s .oauth-env ]; then
            ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
              set -e
              mkdir -p '$REMOTE_WEBROOT/backend'
              if [ -f '$REMOTE_WEBROOT/backend/.env' ]; then
                grep -v -E '^SVP_OAUTH_(GOOGLE|FACEBOOK|ZALO|APPLE)_' '$REMOTE_WEBROOT/backend/.env' > '$REMOTE_WEBROOT/backend/.env.tmp' || true
              else
                : > '$REMOTE_WEBROOT/backend/.env.tmp'
              fi
              cat >> '$REMOTE_WEBROOT/backend/.env.tmp'
              mv '$REMOTE_WEBROOT/backend/.env.tmp' '$REMOTE_WEBROOT/backend/.env'
              chmod 600 '$REMOTE_WEBROOT/backend/.env' || true
            " < .oauth-env
          fi

      - name: Fix permissions and smoke test
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            find '$REMOTE_WEBROOT' -type d -exec chmod 755 {} \; || true
            find '$REMOTE_WEBROOT' -type f -exec chmod 644 {} \; || true
            chmod 755 '$REMOTE_WEBROOT/backend/uploads' || true
            chown -R apache:apache '$REMOTE_WEBROOT' 2>/dev/null || true
          "
          reset_file=".codex-opcache-reset-${GITHUB_RUN_ID}.php"
          cleanup_reset() {
            ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "rm -f '$REMOTE_WEBROOT/$reset_file'" || true
          }
          trap cleanup_reset EXIT
          ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "cat > '$REMOTE_WEBROOT/$reset_file'" <<'PHP'
          <?php
          header('Content-Type: text/plain; charset=utf-8');
          if (function_exists('opcache_reset')) {
              echo opcache_reset() ? 'OPCACHE_RESET_OK' : 'OPCACHE_RESET_SKIPPED';
          } else {
              echo 'OPCACHE_NOT_AVAILABLE';
          }
          PHP
          curl -fsS "https://sodovanphuc.vn/$reset_file"
          curl -fsS https://sodovanphuc.vn/api/svp/health
