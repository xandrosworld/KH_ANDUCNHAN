name: Temporary live admin bootstrap

on:
  workflow_dispatch:
    inputs:
      action:
        description: setup or cleanup
        required: true
        default: setup
        type: choice
        options:
          - setup
          - cleanup

permissions:
  contents: read

jobs:
  live-admin:
    name: Temporary live admin
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.MATBAO_SSH_HOST }}
      SSH_PORT: ${{ secrets.MATBAO_SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.MATBAO_SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.MATBAO_SSH_PRIVATE_KEY }}
      REMOTE_WEBROOT: ${{ secrets.MATBAO_WEBROOT || '/var/www/sodovanphuc/public_html' }}
      TEMP_ADMIN_USERNAME: codex-admin@sodovanphuc.vn
      TEMP_ADMIN_PASSWORD: ${{ secrets.SVP_TEMP_ADMIN_PASSWORD }}

    steps:
      - name: Configure SSH
        run: |
          set -euo pipefail
          test -n "$SSH_HOST"
          test -n "$SSH_USER"
          test -n "$SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/sodovanphuc_deploy_key
          chmod 600 ~/.ssh/sodovanphuc_deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Setup temporary admin
        if: ${{ inputs.action == 'setup' }}
        run: |
          set -euo pipefail
          test -n "$TEMP_ADMIN_PASSWORD"
          ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            cd '$REMOTE_WEBROOT'
            SVP_TEMP_ADMIN_USERNAME='$TEMP_ADMIN_USERNAME' SVP_TEMP_ADMIN_PASSWORD='$TEMP_ADMIN_PASSWORD' php
          " <<'PHP'
          <?php
          $username = getenv('SVP_TEMP_ADMIN_USERNAME') ?: 'codex-admin@sodovanphuc.vn';
          $password = getenv('SVP_TEMP_ADMIN_PASSWORD') ?: '';
          if (strlen($password) < 18) {
              fwrite(STDERR, "Temporary admin password is missing or too short.\n");
              exit(2);
          }

          $root = getcwd();
          $config = $root . '/backend/config/config.php';
          $backup = $root . '/backend/config/config.php.codex-admin-test.bak';
          if (!is_file($config)) {
              fwrite(STDERR, "Live config.php not found.\n");
              exit(3);
          }
          if (!is_file($backup) && !copy($config, $backup)) {
              fwrite(STDERR, "Could not create config backup.\n");
              exit(4);
          }

          $text = file_get_contents($config);
          $hash = password_hash($password, PASSWORD_DEFAULT);
          $text = preg_replace("/define\\('ADMIN_USERNAME',\\s*'[^']*'\\);/", "define('ADMIN_USERNAME', '" . addslashes($username) . "');", $text, 1, $userCount);
          $text = preg_replace("/define\\('ADMIN_PASSWORD_HASH',\\s*'[^']*'\\);/", "define('ADMIN_PASSWORD_HASH', '" . addslashes($hash) . "');", $text, 1, $hashCount);
          if ($userCount !== 1 || $hashCount !== 1) {
              fwrite(STDERR, "Could not patch admin constants.\n");
              exit(5);
          }
          file_put_contents($config, $text);

          require_once $config;
          require_once $root . '/backend/lib/Database.php';
          $db = Database::getInstance();
          $userId = 'codex_live_admin';
          $phone = '0999002026';
          $svpId = 'SVPCODEXADMIN';
          $referralCode = 'SVPCODEXADMIN';
          $passwordHash = password_hash($password, PASSWORD_DEFAULT);

          $db->beginTransaction();
          try {
              $stmt = $db->prepare("
                  INSERT INTO users (id, svp_id, email, phone, password_hash, full_name, role, status, referral_code, created_at, updated_at)
                  VALUES (:id, :svp_id, :email, :phone, :password_hash, 'Codex Live Admin', 'admin', 'active', :referral_code, NOW(), NOW())
                  ON DUPLICATE KEY UPDATE
                    phone = VALUES(phone),
                    password_hash = VALUES(password_hash),
                    full_name = VALUES(full_name),
                    role = 'admin',
                    status = 'active',
                    svp_id = VALUES(svp_id),
                    referral_code = VALUES(referral_code),
                    updated_at = NOW()
              ");
              $stmt->execute([
                  'id' => $userId,
                  'svp_id' => $svpId,
                  'email' => $username,
                  'phone' => $phone,
                  'password_hash' => $passwordHash,
                  'referral_code' => $referralCode,
              ]);

              $stmt = $db->prepare("SELECT id FROM users WHERE email = :email LIMIT 1");
              $stmt->execute(['email' => $username]);
              $actualUserId = (string) $stmt->fetchColumn();
              if ($actualUserId === '') {
                  throw new RuntimeException('Temporary admin user was not created.');
              }

              $stmt = $db->prepare("
                  INSERT INTO svp_user_roles (user_id, role_slug, status, applied_at, approved_by, approved_at)
                  VALUES (:uid, 'admin', 'approved', NOW(), :uid, NOW())
                  ON DUPLICATE KEY UPDATE status = 'approved', approved_by = VALUES(approved_by), approved_at = NOW()
              ");
              $stmt->execute(['uid' => $actualUserId]);

              $db->commit();
          } catch (Throwable $e) {
              $db->rollBack();
              throw $e;
          }

          echo "Temporary live admin is ready.\n";
          PHP

      - name: Cleanup temporary admin
        if: ${{ inputs.action == 'cleanup' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/sodovanphuc_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            cd '$REMOTE_WEBROOT'
            SVP_TEMP_ADMIN_USERNAME='$TEMP_ADMIN_USERNAME' php
          " <<'PHP'
          <?php
          $username = getenv('SVP_TEMP_ADMIN_USERNAME') ?: 'codex-admin@sodovanphuc.vn';
          $root = getcwd();
          $config = $root . '/backend/config/config.php';
          $backup = $root . '/backend/config/config.php.codex-admin-test.bak';
          if (is_file($backup)) {
              copy($backup, $config);
              unlink($backup);
          }

          require_once $config;
          require_once $root . '/backend/lib/Database.php';
          $db = Database::getInstance();
          $stmt = $db->prepare("SELECT id FROM users WHERE email = :email OR id = 'codex_live_admin'");
          $stmt->execute(['email' => $username]);
          $ids = $stmt->fetchAll(PDO::FETCH_COLUMN);
          foreach ($ids as $id) {
              $db->prepare("DELETE FROM svp_role_applications WHERE user_id = :id")->execute(['id' => $id]);
              $db->prepare("DELETE FROM svp_user_roles WHERE user_id = :id")->execute(['id' => $id]);
              $db->prepare("DELETE FROM svp_favorites WHERE user_id = :id")->execute(['id' => $id]);
              $db->prepare("DELETE FROM users WHERE id = :id")->execute(['id' => $id]);
          }
          echo "Temporary live admin cleaned up.\n";
          PHP
